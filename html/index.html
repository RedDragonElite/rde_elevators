<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDE Elevators</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            overflow: hidden;
        }

        #app {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #00ff88;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .current-floor {
            color: #fff;
            font-size: 14px;
            margin-top: 5px;
        }

        .floors {
            max-height: 400px;
            overflow-y: auto;
        }

        .floor {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .floor:hover {
            background: rgba(0, 255, 136, 0.2);
            transform: translateX(5px);
        }

        .floor.restricted {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #ff4444;
        }

        .floor-name {
            color: #00ff88;
            font-size: 18px;
            font-weight: bold;
        }

        .floor-info {
            color: #aaa;
            font-size: 12px;
            margin-top: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #00ff88;
            font-size: 20px;
            padding: 40px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            border: 4px solid rgba(0, 255, 136, 0.1);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🛗 ELEVATOR</h1>
            <div class="current-floor">Current Floor: <span id="currentFloor">-</span></div>
        </div>
        <div class="floors" id="floors"></div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div id="loadingMessage">Traveling...</div>
    </div>

    <script>
        const app = document.getElementById('app');
        const floors = document.getElementById('floors');
        const currentFloor = document.getElementById('currentFloor');
        const loading = document.getElementById('loading');
        const loadingMessage = document.getElementById('loadingMessage');

        let currentElevatorId = null;

        window.addEventListener('message', (event) => {
            const data = event.data;

            switch(data.action) {
                case 'openElevator':
                    openElevator(data.data);
                    break;
                case 'close':
                    closeElevator();
                    break;
                case 'showLoading':
                    showLoading(data.message, data.duration);
                    break;
                case 'hideLoading':
                    hideLoading();
                    break;
            }
        });

        function openElevator(data) {
            currentElevatorId = data.elevatorId;
            currentFloor.textContent = data.currentFloor;
            
            floors.innerHTML = '';
            data.floors.forEach(floor => {
                const floorEl = document.createElement('div');
                floorEl.className = 'floor' + (floor.canAccess ? '' : ' restricted');
                
                floorEl.innerHTML = `
                    <div class="floor-name">${floor.name}</div>
                    <div class="floor-info">
                        ${floor.restricted ? '🔒 ' + (floor.restrictionType === 'vip' ? 'VIP Only' : 'Restricted') : '✅ Available'}
                    </div>
                `;

                if (floor.canAccess) {
                    floorEl.addEventListener('click', () => {
                        selectFloor(floor.name);
                    });
                }

                floors.appendChild(floorEl);
            });

            app.style.display = 'block';
        }

        function closeElevator() {
            app.style.display = 'none';
            currentElevatorId = null;
        }

        function selectFloor(floorName) {
            fetch(`https://${GetParentResourceName()}/selectFloor`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    elevatorId: currentElevatorId,
                    floorName: floorName
                })
            });
        }

        function showLoading(message, duration) {
            loadingMessage.textContent = message || 'Traveling...';
            loading.style.display = 'block';
        }

        function hideLoading() {
            loading.style.display = 'none';
        }

        // Close on ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                fetch(`https://${GetParentResourceName()}/close`, {
                    method: 'POST'
                });
                closeElevator();
            }
        });
    </script>
</body>
</html>
